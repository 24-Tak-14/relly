name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]
        python-version: [3.9] # Use a specific Python version

    steps:
    - uses: actions/checkout@v3

    # Frontend Setup (Node.js)
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm' # Cache npm dependencies

    - name: Install Frontend Dependencies
      run: npm ci --prefix frontend

    - name: Run Frontend Lint
      run: npm run lint --prefix frontend

    - name: Run Frontend Tests
      run: CI=true npm test --prefix frontend

    # Backend Setup (Python)
    - name: Use Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Cache pip dependencies

    - name: Install Backend Dependencies
      run: pip install -r requirements.txt # Assuming requirements.txt will be created

    - name: Run Backend Tests
      run: pytest

    - name: Run Backend Linting (e.7.ruff)
      run: ruff check .

    # Build and Deploy Steps (Placeholder)
