name: Playwright MCP server
on: [push, pull_request]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright
        run: |
          npm --prefix "Z Nexus" install @playwright/test --no-save
          cd "Z Nexus" && npx -y playwright install --with-deps
      - name: Build app
        run: npm --prefix "Z Nexus" run build
      - name: Start preview (background)
        run: npm --prefix "Z Nexus" run preview -- --port=5173 &
      - name: Wait for site
        run: |
          for i in {1..30}; do curl -sSf http://127.0.0.1:5173 && break || sleep 1; done
      - name: Run Playwright tests
        run: npm --prefix "Z Nexus" run test:e2e -- --config=playwright.config.ts --reporter=dot
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
